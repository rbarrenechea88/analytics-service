name: CI/CD Python Service

on:
  push:
    branches: [ "main" ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true

      - name: Run pip-audit (SCA)
        run: |
          pip install pip-audit
          pip-audit || true

  build-and-push:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Tag Image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_REPO=${{ github.event.repository.name }}
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/$ECR_REPO:latest -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push to ECR
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_REPO=${{ github.event.repository.name }}
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}

      - name: Update GitOps Manifest
        run: |
          git clone https://x-access-token:${{ secrets.MY_GITHUB_TOKEN }}@github.com/rbarrenechea88/togglemaster-manifestst.git
          cd togglemaster-manifestst
          # Atualiza a tag da imagem específica deste repo no arquivo python-services.yaml
          sed -i "s|image: 445567109642.dkr.ecr.us-east-1.amazonaws.com/${{ github.event.repository.name }}:.*|image: 445567109642.dkr.ecr.us-east-1.amazonaws.com/${{ github.event.repository.name }}:${{ github.sha }}|g" python-services.yaml
          git config --global user.email "gitops-bot@togglemaster.com"
          git config --global user.name "GitOps Bot"
          git add python-services.yaml
          git commit -m "deploy: update ${{ github.event.repository.name }} to ${{ github.sha }} [skip ci]"
          git push origin main
